<!--
  KPTZ Live Player — Wix "HTML iframe" embed snippet
  ====================================================
  In Wix Editor:
    1. Add Element → Embed → HTML iframe  (or "Embed Code")
    2. Paste this entire block into the editor (or load via URL)
    3. Adjust the playerUrl variable in the <script> below if needed
    4. Size the iframe element to fit the button:
       - Default size: roughly 160px wide × 48px tall
       - If scaled (e.g., 1.5x), scale the iframe size proportionally (e.g., 240px wide × 72px tall)

  How to change button size proportionally:
    - IF USING HTML CODE: Change the `--scale` CSS variable inside the <style> tag below (e.g., `--scale: 1.5;`).
    - IF USING WEBSITE URL: Append `?scale=1.5` (or `?s=1.5`) to your iframe URL.

  On desktop: Opens the full player in a named pop-out window.
              If the listener clicks it again, the existing window
              is focused rather than opening a second instance and
              the stream keeps playing.
  On mobile:  navigates directly to the player URL so the player
              opens in a new tab in the browser.
-->

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* --- SCALE CONTROL ---
       Change this value directly if pasting code into Wix (e.g. 1.2, 1.5, 2)
       Note: You must also size the Wix iframe element larger to prevent clipping. */
    --scale: 1;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .listen-btn {
    display: flex;
    align-items: center;
    gap: calc(7px * var(--scale));
    background: #8b1a1a;
    color: #fff;
    border: none;
    border-radius: calc(5px * var(--scale));
    padding: calc(8px * var(--scale)) calc(14px * var(--scale));
    font-size: calc(13px * var(--scale));
    font-weight: 600;
    letter-spacing: 0.03em;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .listen-btn:hover { background: #a82020; }
  .listen-btn:active { background: #701414; }

  .live-dot {
    width: calc(7px * var(--scale));
    height: calc(7px * var(--scale));
    border-radius: 50%;
    background: #ff7070;
    flex-shrink: 0;
    animation: pulse 1.6s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }
</style>

<button class="listen-btn" onclick="openPlayer()" title="Open KPTZ live player">
  <span class="live-dot"></span>
  Listen Live
</button>

<script>
  // Player URL
  var playerUrl = 'https://player.kptz.org/player.html';

  // Pop-out window dimensions
  var width  = 320;
  var height = 380;

  // Read ?scale=X or ?s=X from URL parameters (e.g., wix-embed.html?scale=1.5)
  // to scale the button dynamically when hosted as a URL.
  try {
    var urlParams = new URLSearchParams(window.location.search);
    var scaleParam = urlParams.get('scale') || urlParams.get('s');
    if (scaleParam) {
      var scaleValue = parseFloat(scaleParam);
      if (!isNaN(scaleValue) && scaleValue > 0) {
        document.documentElement.style.setProperty('--scale', scaleValue);
      }
    }
  } catch (e) {
    console.warn('Could not parse URL parameters:', e);
  }

  function isMobile() {
    return /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent)
      || (navigator.maxTouchPoints > 1 && /Macintosh/.test(navigator.userAgent)); // iPad OS
  }

  function openPlayer() {
    if (isMobile()) {
      // window.open() is typically blocked by mobile browsers inside a sandboxes iframe.
      // Creating and clicking a temporary <a> tag is treated as a direct user-gesture
      // navigation and is never blocked.
      var a = document.createElement('a');
      a.href = playerUrl;
      a.target = '_blank';
      a.rel = 'noopener';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      return;
    }

    // Desktop: open the full player in a named pop-out window
    var left = Math.round((screen.width  - width)  / 2);
    var top  = Math.round((screen.height - height) / 2);

    var features = [
      'width='  + width,
      'height=' + height,
      'left='   + left,
      'top='    + top,
      'resizable=yes',
      'scrollbars=no',
      'toolbar=no',
      'menubar=no',
      'location=no',
      'status=no',
    ].join(',');

    // 'kptz-player' is the window name — clicking again focuses
    // the existing window rather than spawning a second one
    var win = window.open(playerUrl, 'kptz-player', features);
    if (win) win.focus();
  }
</script>
